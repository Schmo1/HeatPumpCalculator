services:
  api:
    build:
      context: ./backend/HeatPumpCalculator.Api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Data Source=/data/heatpump.db"
      Jwt__Key: "${JWT_KEY:?JWT_KEY must be set in .env (>= 32 characters)}"
      Jwt__Issuer: "HeatPumpCalculator"
      Jwt__Audience: "HeatPumpCalculator"
      Jwt__ExpiryHours: "12"
      Seed__AdminUsername: "${ADMIN_USERNAME:-admin}"
      Seed__AdminPassword: "${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}"
      Seed__ReaderUsername: "${READER_USERNAME:-viewer}"
      Seed__ReaderPassword: "${READER_PASSWORD:?READER_PASSWORD must be set in .env}"
    volumes:
      - heatpump-data:/data
    restart: unless-stopped
    expose:
      - "8080"

  web:
    build:
      context: ./frontend
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  heatpump-data:
